<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KiX · 从落地页到上线（完整旅程）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F7F4; --card:#FFFFFF;
  --ink:#0B1220; --ink-2:#26324A; --muted:#5C6B7A; --muted-2:#94A3B0;
  --line:#E4EBE8; --line-2:#EEF3F0;
  --green:#16A34A; --green-d:#15803D; --green-br:#22C55E; --green-50:#ECFDF3; --green-100:#D5F5E0;
  --amber:#F59E0B; --sky:#0EA5E9;
  --r:18px;
  --sh-sm:0 1px 2px rgba(16,24,40,.06);
  --sh:0 14px 40px -16px rgba(16,24,40,.20);
  --sh-lg:0 40px 90px -30px rgba(11,18,32,.40);
  --sans:"Plus Jakarta Sans",-apple-system,"PingFang SC","Noto Sans SC",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;
  background:radial-gradient(80% 50% at 78% 0%, #FFF7E8 0%, rgba(255,247,232,0) 55%),
    radial-gradient(90% 60% at 12% 4%, #E7F6EC 0%, rgba(231,246,236,0) 50%), var(--bg);}
:lang(zh){line-height:1.7}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,select{font-family:inherit}

/* shared buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:700;border-radius:13px;font-size:15.5px;padding:14px 22px;transition:transform .12s,box-shadow .2s,background .2s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn.sm{font-size:14.5px;padding:11px 18px}
.btn.lg{font-size:17px;padding:17px 30px}
.btn.dark{background:var(--ink);color:#fff}.btn.dark:hover{background:#1b2940}
.btn.primary{background:var(--green);color:#fff;box-shadow:0 10px 24px -10px rgba(22,163,74,.65)}
.btn.primary:hover{background:var(--green-d)}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{border-color:var(--muted-2)}
.btn.white{background:#fff;color:var(--ink)}.btn.white:hover{background:#f3f6f4}
.btn[disabled]{opacity:.45;pointer-events:none}

.grid-bg{position:absolute;top:0;left:0;right:0;height:900px;z-index:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(#0b122008 1px,transparent 1px),linear-gradient(90deg,#0b122008 1px,transparent 1px);
  background-size:46px 46px;-webkit-mask-image:radial-gradient(70% 55% at 50% 12%,#000 0%,transparent 75%);}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 32px}

/* ===== landing ===== */
nav{display:flex;align-items:center;gap:30px;padding:22px 0}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:21px;letter-spacing:-.02em}
.logo-img{height:32px;width:auto;display:block}
.logo .mk{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;background:var(--ink);color:var(--green-br);font-weight:800;font-size:15px;transform:rotate(-5deg)}
.logo .tg{font-size:11px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);padding:3px 8px;border-radius:999px;transform:none}
.navlinks{display:flex;gap:26px;margin-left:8px}
.navlinks a{font-size:15px;font-weight:600;color:var(--ink-2)}.navlinks a:hover{color:var(--green-d)}
.navright{margin-left:auto;display:flex;align-items:center;gap:14px}
.signin{font-size:15px;font-weight:600;color:var(--ink-2);cursor:pointer;text-decoration:none}
.signin:hover{color:var(--ink)}
.langtoggle{display:flex;gap:2px;background:#F1F5F3;border-radius:999px;padding:3px;flex:none}
.langtoggle button{font-size:12.5px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:999px;transition:all .15s}
.langtoggle button.on{background:#fff;color:var(--ink);box-shadow:var(--sh-sm)}
.iconx{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line);background:#fff;flex:none}
.iconx:hover{color:var(--ink);border-color:var(--muted-2)}

.sec{padding:78px 0}
.sec-eye{font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--green-d);text-align:center}
.sec-h{font-size:clamp(28px,3.6vw,40px);font-weight:800;letter-spacing:-.025em;text-align:center;margin:12px 0 0;line-height:1.18}
.sec-sub{text-align:center;color:var(--muted);font-size:17px;margin:14px auto 0;max-width:48ch}

.hero{display:grid;grid-template-columns:minmax(0,1.04fr) minmax(0,.96fr);gap:52px;align-items:center;padding:40px 0 30px}
.eyebrow{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 15px 7px 12px;font-size:13.5px;font-weight:600;color:var(--ink-2);box-shadow:var(--sh-sm)}
.eyebrow .pin{width:7px;height:7px;border-radius:999px;background:var(--green-br);box-shadow:0 0 0 4px var(--green-50)}
h1.hero-h{font-size:clamp(40px,5.4vw,64px);line-height:1.08;letter-spacing:-.035em;font-weight:800;margin:22px 0 0}
h1.hero-h .hl{color:var(--green-d);position:relative;white-space:nowrap}
h1.hero-h .hl::after{content:"";position:absolute;left:-1px;right:-1px;bottom:.07em;height:.26em;z-index:-1;background:var(--green-100);border-radius:4px}
.lede{font-size:18.5px;color:var(--ink-2);margin-top:22px;max-width:32ch}
.lede b{color:var(--ink);font-weight:700}
.cta-row{display:flex;gap:14px;align-items:center;margin-top:30px;flex-wrap:wrap}
.proof{display:flex;align-items:center;gap:24px;margin-top:36px;padding-top:24px;border-top:1px solid var(--line)}
.proof .tagm{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.03em;text-transform:uppercase;max-width:62px;line-height:1.3}
.stat .n{font-size:25px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.stat .n b{color:var(--green-d)}
.stat .l{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:1px}
.stat-sep{width:1px;height:34px;background:var(--line)}

.visual{position:relative;display:flex;justify-content:center}
.phone{position:relative;width:308px;background:#0B1220;border-radius:42px;padding:11px;box-shadow:var(--sh-lg)}
.phone::before{content:"";position:absolute;top:15px;left:50%;transform:translateX(-50%);width:92px;height:23px;background:#0B1220;border-radius:0 0 16px 16px;z-index:3}
.screen{background:linear-gradient(180deg,#fff,#F4FAF6);border-radius:32px;overflow:hidden;height:572px;position:relative;display:flex;flex-direction:column}
.appbar{display:flex;align-items:center;gap:9px;padding:30px 18px 14px;background:#fff;border-bottom:1px solid var(--line-2)}
.appbar .blogo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;color:#fff;background:#7A4B2B}
.appbar .bt{font-weight:800;font-size:15px}.appbar .bs{font-size:11px;color:var(--muted);font-weight:500}
.appbar .livechip{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--green-d);background:var(--green-50);padding:4px 9px;border-radius:999px;display:flex;align-items:center;gap:5px}
.appbar .livechip .b{width:6px;height:6px;border-radius:999px;background:var(--green-br)}
.gamearea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px 16px 22px;background:radial-gradient(120% 90% at 50% 10%, #FFF7EA 0%, #fff 60%)}
.gametitle{font-weight:800;font-size:16px;text-align:center}.gametitle span{color:#7A4B2B}
.mw-box{position:relative;width:208px;height:208px;display:grid;place-items:center}
.mw-pointer{position:absolute;top:-3px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:18px solid var(--ink);filter:drop-shadow(0 2px 3px rgba(0,0,0,.25))}
.mw{width:196px;height:196px;border-radius:999px;position:relative;box-shadow:0 0 0 7px #fff,0 0 0 10px #EADBCB,0 18px 36px -10px rgba(0,0,0,.4);transition:transform 4.4s cubic-bezier(.16,.84,.3,1)}
.mw .lab{position:absolute;left:50%;top:13px;transform:translateX(-50%);font-size:9.5px;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.4);max-width:62px;text-align:center}
.mw-hub{position:absolute;width:46px;height:46px;border-radius:999px;background:#fff;z-index:4;display:grid;place-items:center;box-shadow:0 3px 9px rgba(0,0,0,.22);color:#7A4B2B}
.mw-hub svg{width:24px;height:24px}
.mw-spin{background:var(--ink);color:#fff;font-weight:800;font-size:15px;padding:12px 30px;border-radius:999px;box-shadow:var(--sh);transition:transform .1s}
.mw-spin:hover{transform:translateY(-2px)}.mw-spin[disabled]{opacity:.55;pointer-events:none}
.gameresult{min-height:22px;font-size:14px;font-weight:700;text-align:center}.gameresult b{color:var(--green-d)}
.float{position:absolute;background:#fff;border-radius:14px;box-shadow:var(--sh);padding:11px 14px;display:flex;align-items:center;gap:10px;z-index:6;animation:floaty 4s ease-in-out infinite}
.float .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
.float .ft{font-size:13px;font-weight:700;line-height:1.2}.float .fs{font-size:11px;color:var(--muted);font-weight:500}
.float.f1{top:50px;left:-26px;animation-delay:.2s}.float.f2{bottom:74px;right:-30px;animation-delay:1.4s}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.loop{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px;color:var(--muted);font-size:13.5px;font-weight:600;flex-wrap:wrap}
.loop b{color:var(--ink-2)}.loop .arr{color:var(--green)}

.three{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:46px}
.tcard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:26px;box-shadow:var(--sh-sm);transition:transform .18s,box-shadow .18s}
.tcard:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.tcard .tnum{font-size:12.5px;font-weight:800;color:var(--green-d);letter-spacing:.05em}
.tcard h3{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:10px 0 8px}
.tcard p{font-size:15px;color:var(--muted);margin:0}
.tcard .viz{margin-top:18px;border-radius:14px;background:linear-gradient(180deg,#F7FBF9,#fff);border:1px solid var(--line-2);padding:16px;min-height:108px;display:flex;flex-direction:column;justify-content:center;gap:9px}
.vrow{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--ink-2)}
.vrow .vp{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none;font-size:13px}
.vbignum{font-size:30px;font-weight:800;letter-spacing:-.02em}.vbignum b{color:var(--green-d)}
.vmini{font-size:12px;color:var(--muted);font-weight:500}
.vbar{height:8px;border-radius:999px;background:#EAF1EE;overflow:hidden}.vbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-br));border-radius:999px}

.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:42px}
.gtile{border-radius:18px;overflow:hidden;box-shadow:var(--sh-sm);transition:transform .2s,box-shadow .2s;cursor:pointer}
.gtile:hover{transform:translateY(-5px) rotate(-1deg);box-shadow:var(--sh)}
.gtile .art{aspect-ratio:9/16;display:grid;place-items:center;position:relative}
.gtile .art .m{font-size:58px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.22))}
.gtile .cap{background:#fff;padding:11px 13px;font-size:13.5px;font-weight:700}
.gtile .cap .sm{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:1px}
.gallery-foot{text-align:center;margin-top:30px;color:var(--muted);font-size:15px}

/* ===== animated gameplay previews (loop = stand-in for short gameplay video) ===== */
.gp{position:absolute;inset:0;overflow:hidden;display:grid;place-items:center}
.gp::before{content:"";position:absolute;inset:0;background:radial-gradient(125% 95% at 50% -10%,rgba(255,255,255,.20),transparent 62%);pointer-events:none;z-index:4}
.gp-tag{position:absolute;left:9px;bottom:8px;z-index:5;display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;letter-spacing:.05em;color:#fff;background:rgba(0,0,0,.30);backdrop-filter:blur(3px);padding:3px 7px 3px 6px;border-radius:999px;text-transform:uppercase}
.gp-tag svg{width:9px;height:9px}
/* spin */
.gp-spin .gp-wheel{width:62%;aspect-ratio:1;border-radius:50%;box-shadow:0 6px 18px rgba(0,0,0,.25),inset 0 0 0 3px rgba(255,255,255,.9);animation:gpSpin 3.4s cubic-bezier(.18,.7,.16,1) infinite}
@keyframes gpSpin{0%{transform:rotate(0)}68%{transform:rotate(986deg)}100%{transform:rotate(1080deg)}}
.gp-spin .gp-hub{position:absolute;width:15%;aspect-ratio:1;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:2}
.gp-spin .gp-needle{position:absolute;top:9%;z-index:3;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:12px solid #fff;filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}
/* scratch */
.gp-scratch .gp-card{position:relative;width:66%;height:52%;border-radius:13px;background:#fff;display:grid;place-items:center;box-shadow:0 8px 18px rgba(0,0,0,.22);overflow:hidden}
.gp-scratch .pz{display:grid;place-items:center}
.gp-scratch .pz svg{width:34px;height:34px}
.gp-scratch .foil{position:absolute;inset:0;background:repeating-linear-gradient(125deg,rgba(255,255,255,.96) 0 7px,rgba(210,220,235,.95) 7px 14px);animation:gpScratch 3s ease-in-out infinite}
@keyframes gpScratch{0%,14%{clip-path:inset(0 0 0 0)}60%,100%{clip-path:inset(0 0 0 100%)}}
.gp-scratch .shine{position:absolute;top:0;left:-45%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.85),transparent);transform:skewX(-18deg);animation:gpShine 3s ease-in-out infinite;z-index:3}
@keyframes gpShine{0%,58%{left:-45%}82%,100%{left:130%}}
/* stack */
.gp-stack-w{position:relative;width:42%;height:66%;display:flex;flex-direction:column-reverse;gap:5px}
.gp-stack-w i{height:17px;border-radius:5px;background:rgba(255,255,255,.94);box-shadow:0 2px 5px rgba(0,0,0,.18);transform-origin:bottom;animation:gpStack 3.2s ease-in-out infinite;animation-delay:var(--d)}
@keyframes gpStack{0%,6%{transform:scaleY(0) translateY(-16px);opacity:0}20%{transform:scaleY(1) translateY(0);opacity:1}84%{transform:scaleY(1) translateY(0);opacity:1}94%,100%{transform:scaleY(1) translateY(0);opacity:0}}
/* merge */
.gp-merge-w{position:relative;width:82%;height:48%}
.gp-merge-w i{position:absolute;top:50%;border-radius:50%;background:rgba(255,255,255,.94);box-shadow:0 3px 8px rgba(0,0,0,.2)}
.gp-merge-w .m1{width:28px;height:28px;left:6%;margin-top:-14px;animation:gpM1 2.8s ease-in-out infinite}
.gp-merge-w .m2{width:28px;height:28px;right:6%;margin-top:-14px;animation:gpM2 2.8s ease-in-out infinite}
.gp-merge-w .mb{width:48px;height:48px;left:50%;margin-left:-24px;margin-top:-24px;transform:scale(0);animation:gpMb 2.8s ease-in-out infinite}
@keyframes gpM1{0%{left:6%;opacity:1}42%,100%{left:calc(50% - 14px);opacity:0}}
@keyframes gpM2{0%{right:6%;opacity:1}42%,100%{right:calc(50% - 14px);opacity:0}}
@keyframes gpMb{0%,40%{transform:scale(0)}54%{transform:scale(1.16)}68%,88%{transform:scale(1)}100%{transform:scale(0)}}
/* drop */
.gp-drop-w{position:relative;width:66%;height:74%}
.gp-drop-w .box{position:absolute;left:50%;margin-left:-14px;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.96);box-shadow:0 3px 8px rgba(0,0,0,.2);animation:gpDrop 2.4s cubic-bezier(.4,0,.5,1) infinite}
@keyframes gpDrop{0%{top:-32px;opacity:0}14%{opacity:1}68%{top:54%}78%{top:48%}88%{top:52%}100%{top:52%;opacity:0}}
.gp-drop-w .tray{position:absolute;bottom:4%;left:50%;margin-left:-30px;width:60px;height:16px;border-radius:0 0 11px 11px;border:3px solid rgba(255,255,255,.94);border-top:none}
/* flip */
.gp-flip-w{display:flex;gap:11px;perspective:520px}
.gp-flip-w .fc{width:38px;height:52px;position:relative;transform-style:preserve-3d;animation:gpFlip 3s ease-in-out infinite}
.gp-flip-w .fc.d{animation-delay:.32s}
.gp-flip-w .fc .face,.gp-flip-w .fc .back{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden;display:grid;place-items:center;box-shadow:0 3px 9px rgba(0,0,0,.22)}
.gp-flip-w .fc .back{background:rgba(255,255,255,.34)}
.gp-flip-w .fc .face{background:#fff;transform:rotateY(180deg)}
.gp-flip-w .fc .face svg{width:22px;height:22px}
@keyframes gpFlip{0%,16%{transform:rotateY(0)}50%,86%{transform:rotateY(180deg)}100%{transform:rotateY(0)}}
/* hoop */
.gp-hoop-w{position:relative;width:84%;height:82%}
.gp-hoop-w .rim{position:absolute;top:18%;right:14%;width:36px;height:11px;border-radius:50%;border:3px solid rgba(255,255,255,.94);box-shadow:0 4px 0 -1px rgba(255,255,255,.3)}
.gp-hoop-w .ball{position:absolute;left:12%;bottom:8%;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.96);box-shadow:0 3px 8px rgba(0,0,0,.2);animation:gpShoot 2.6s ease-in-out infinite}
@keyframes gpShoot{0%{left:12%;bottom:8%}44%{left:54%;bottom:66%}66%{left:72%;bottom:26%;opacity:1}80%{left:72%;bottom:8%;opacity:1}100%{left:72%;bottom:4%;opacity:0}}
/* draw */
.gp-draw-w{position:relative;width:58%;height:72%}
.gp-draw-w .slot{position:absolute;bottom:4%;left:0;right:0;height:42%;border-radius:10px;background:rgba(255,255,255,.22);box-shadow:inset 0 4px 9px rgba(0,0,0,.18);z-index:2}
.gp-draw-w .ticket{position:absolute;left:13%;right:13%;bottom:28%;height:48%;border-radius:8px;background:#fff;box-shadow:0 5px 11px rgba(0,0,0,.24);display:grid;place-items:center;z-index:1;animation:gpDraw 3s ease-in-out infinite}
.gp-draw-w .ticket svg{width:24px;height:24px}
@keyframes gpDraw{0%,12%{transform:translateY(52%);opacity:.25}46%,80%{transform:translateY(-28%);opacity:1}100%{transform:translateY(52%);opacity:.25}}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:42px}
.stp{background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;position:relative}
.stp .sn{position:absolute;top:20px;right:22px;font-size:13px;font-weight:800;color:var(--muted-2)}
.stp .si{width:46px;height:46px;border-radius:13px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;margin-bottom:16px}
.stp .si svg{width:24px;height:24px}
.stp h3{font-size:18px;font-weight:800;margin:0 0 6px;letter-spacing:-.01em}
.stp p{font-size:14.5px;color:var(--muted);margin:0}

.tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:42px;align-items:stretch}
.tier{background:#fff;border:1px solid var(--line);border-radius:22px;padding:28px;display:flex;flex-direction:column;gap:6px}
.tier.pop{border:2px solid var(--green);box-shadow:var(--sh);position:relative}
.tier .pbadge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:12px;font-weight:700;padding:5px 14px;border-radius:999px}
.tier .tname{font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2)}
.tier .price{font-size:38px;font-weight:800;letter-spacing:-.03em;margin:6px 0 2px}
.tier .price small{font-size:15px;font-weight:600;color:var(--muted)}
.tier .pdesc{font-size:14px;color:var(--muted);min-height:42px}
.tier ul{list-style:none;padding:0;margin:8px 0 18px;display:flex;flex-direction:column;gap:10px}
.tier li{display:flex;gap:9px;font-size:14.5px;color:var(--ink-2);align-items:flex-start}
.tier li .ck{color:var(--green-d);flex:none;margin-top:2px}
.tier .btn{width:100%;margin-top:auto}

.final{background:linear-gradient(135deg,#15803D,#22C55E);border-radius:30px;padding:62px 32px;text-align:center;color:#fff;margin:20px 0 0;box-shadow:var(--sh)}
.final h2{font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-.025em;margin:0}
.final p{font-size:17px;opacity:.92;margin:14px 0 0}
.final .cta-row{justify-content:center}
.final-cta{font-size:19px;padding:20px 46px;border-radius:16px}
footer{padding:44px 0 56px;color:var(--muted);font-size:13.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;border-top:1px solid var(--line);margin-top:60px}

.switch{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:30;background:rgba(11,18,32,.92);color:#fff;border-radius:999px;padding:7px 8px;display:flex;align-items:center;gap:4px;box-shadow:var(--sh);backdrop-filter:blur(6px)}
.switch .sl{font-size:12px;font-weight:600;color:#9fb0c4;padding:0 8px}
.switch button{font-size:12.5px;font-weight:700;color:#cdd8e6;padding:7px 13px;border-radius:999px;transition:all .15s}
.switch button.on{background:var(--green);color:#fff}

/* ===== register ===== */
.reg-wrap{min-height:calc(100vh - 86px);display:flex;align-items:flex-start;justify-content:center;padding:18px 24px 60px}
.reg-card{width:100%;max-width:460px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:34px;box-shadow:var(--sh);animation:rise .5s cubic-bezier(.2,.8,.2,1) both}
.reg-badge{display:inline-flex;align-items:center;gap:7px;background:var(--green-50);color:var(--green-d);font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:999px}
.reg-card h1{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:0 0 22px}
.login-sub{color:var(--muted);font-size:14.5px;line-height:1.6;margin:-12px 0 22px}
.otp-input{width:100%;text-align:center;font-size:30px;font-weight:800;letter-spacing:14px;padding:14px;border-radius:14px;border:1.5px solid var(--line);color:var(--ink)}
.otp-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px var(--green-50)}
.reg-card .rsub{color:var(--muted);font-size:15px;margin:0 0 22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13.5px;font-weight:700;color:var(--ink-2);margin-bottom:7px}
.field label .opt{color:var(--muted-2);font-weight:500}
.field label .req{color:var(--green-d)}
.field input,.field select{width:100%;font-size:15.5px;font-weight:500;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:#fff;color:var(--ink);transition:border-color .2s,box-shadow .2s}
.field input::placeholder{color:var(--muted-2);font-weight:400}
.field input:focus,.field select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px var(--green-50)}
.phonewrap{display:flex;gap:8px}.phonewrap .cc{flex:none;width:84px}
.reg-card .btn{width:100%;justify-content:center;margin-top:10px;font-size:16.5px;padding:16px;border-radius:14px}
.reg-card .btn[disabled]{opacity:1;background:#7FCF9C;box-shadow:none;color:#fff}
.reg-trust{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:16px;font-size:12.5px;font-weight:600;color:var(--green-d)}
.reg-trust span{display:flex;align-items:center;gap:5px}
.reg-fine{font-size:12.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
.reg-fine a{color:var(--green-d);font-weight:600}

/* ===== flow shell ===== */
.shell{min-height:100vh;display:flex;flex-direction:column;background:radial-gradient(120% 80% at 50% -20%, #FFFFFF 0%, var(--bg) 55%)}
.topbar{display:flex;align-items:center;gap:24px;padding:16px 28px;position:relative}
.topbar .stepper{position:absolute;left:50%;transform:translateX(-50%)}
.stepper{display:flex;align-items:center;gap:6px;margin:0 auto}
.step{display:flex;align-items:center;gap:8px;opacity:.45;transition:opacity .3s}
.step.active,.step.done{opacity:1}
.step .dot{width:24px;height:24px;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:700;background:#EAF1EE;color:var(--muted-2);border:1.5px solid var(--line);transition:all .3s}
.step.active .dot{background:var(--ink);color:#fff;border-color:var(--ink)}
.step.done .dot{background:var(--green);color:#fff;border-color:var(--green)}
.step .lbl{font-size:13px;font-weight:600;color:var(--ink-2)}
.step .bar{width:22px;height:2px;border-radius:2px;background:var(--line)}
.step.done .bar{background:var(--green)}
.ghost-x{color:var(--muted);font-size:13px;font-weight:600;padding:8px 12px;border-radius:10px}
.ghost-x:hover{background:#EAF1EE}
.stage{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:14px 24px 60px}
.canvas{width:100%;max-width:1040px;animation:rise .5s cubic-bezier(.2,.8,.2,1) both}
.canvas.wide{max-width:1200px}
.canvas.narrow{max-width:680px}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.f-eye{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green-d)}
h1.big{font-size:clamp(30px,4.4vw,46px);line-height:1.12;letter-spacing:-.03em;font-weight:800;margin:14px 0 0}
.sub{color:var(--muted);font-size:17px;margin-top:14px;max-width:46ch}
.center{text-align:center}.center .sub{margin-left:auto;margin-right:auto}

.describe-wrap{display:flex;flex-direction:column;align-items:center;padding-top:4vh}
.canvas.narrow.describe-wrap{max-width:820px}
.bigfield{margin-top:30px;width:100%;max-width:720px}
.bigfield input{width:100%;font-size:20px;font-weight:600;padding:20px 22px;border-radius:var(--r);border:2px solid var(--line);background:#fff;box-shadow:var(--sh-sm);transition:border-color .2s,box-shadow .2s;color:var(--ink)}
.bigfield input::placeholder{color:var(--muted-2);font-weight:500}
.bigfield input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px var(--green-50)}
.chips{display:flex;flex-wrap:nowrap;gap:8px;justify-content:center;margin-top:18px;max-width:820px}
.site-field{margin-top:18px;width:100%;max-width:720px}
.site-field input{width:100%;font-size:15px;font-weight:500;padding:13px 16px;border-radius:13px;border:1.5px solid var(--line);background:#fff;color:var(--ink)}
.site-field input::placeholder{color:var(--muted-2)}
.site-field input:focus{outline:none;border-color:var(--green)}
.chip{font-size:13.5px;font-weight:600;color:var(--ink-2);background:#fff;border:1.5px solid var(--line);padding:8px 13px;border-radius:999px;transition:all .15s;box-shadow:var(--sh-sm);white-space:nowrap}
.chip:hover{border-color:var(--green);color:var(--green-d);transform:translateY(-1px)}
.chip .pre{color:var(--muted-2);font-size:12px;margin-right:6px;font-weight:500}
.btn-row{display:flex;gap:12px;align-items:center;margin-top:30px}

.loader{max-width:520px;margin:7vh auto 0;text-align:center}
.loader h2{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:16px 0 4px}.loader .who{color:var(--green-d)}
.tasklist{margin:30px auto 0;text-align:left;max-width:380px;display:flex;flex-direction:column;gap:14px}
.task{display:flex;align-items:center;gap:13px;font-size:16px;font-weight:600;color:var(--muted-2);transition:color .3s}
.task.on{color:var(--ink)}
.task .tick{width:26px;height:26px;border-radius:999px;border:2px solid var(--line);display:grid;place-items:center;flex:none;transition:all .3s}
.task.on .tick{border-color:var(--green);background:var(--green);color:#fff}
.task.cur .tick{border-color:var(--green);background:#fff;color:var(--green)}
.spin{width:13px;height:13px;border:2.5px solid var(--green-100);border-top-color:var(--green);border-radius:999px;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.progress{height:7px;border-radius:999px;background:#EAF1EE;overflow:hidden;margin:34px auto 0;max-width:380px}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-br));border-radius:999px;transition:width .4s ease}

.results-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.results-head h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:6px 0 0}.results-head h1 b{color:var(--green-d)}
.relink{font-size:14px;font-weight:600;color:var(--muted);padding:8px 12px;border-radius:10px}.relink:hover{background:#EAF1EE;color:var(--ink-2)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:24px}
.gcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative}
.gcard:hover{transform:translateY(-4px);box-shadow:var(--sh);border-color:var(--green-100)}
.thumb{aspect-ratio:9/16;display:grid;place-items:center;position:relative;overflow:hidden}
.thumb .motif{font-size:74px;filter:drop-shadow(0 8px 16px rgba(0,0,0,.22));transition:transform .25s}
.gcard:hover .thumb .motif{transform:scale(1.08) rotate(-3deg)}
.thumb .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(11,18,32,.30);opacity:0;transition:opacity .2s}
.gcard:hover .thumb .play{opacity:1}
.thumb .play span{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--ink);font-weight:700;font-size:14px;padding:10px 18px;border-radius:999px;box-shadow:var(--sh)}
.gmeta{padding:14px 16px 16px}
.gname{font-weight:700;font-size:16.5px;letter-spacing:-.01em}
.gtag{font-size:13px;color:var(--muted);margin-top:3px;font-weight:500}
.ribbon{position:absolute;top:12px;left:12px;z-index:2;display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:#fff;font-size:12px;font-weight:700;padding:6px 11px;border-radius:999px;box-shadow:var(--sh)}
.ribbon .dot{width:6px;height:6px;border-radius:999px;background:var(--green-br)}

.detail{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);gap:40px;align-items:center}
.demo-stage{background:radial-gradient(120% 120% at 50% 0%,#fff,#EAF2EE);border:1px solid var(--line);border-radius:26px;padding:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:440px;box-shadow:var(--sh)}
.demo-live{font-size:12px;font-weight:700;color:var(--green-d);display:flex;align-items:center;gap:7px;align-self:flex-start;background:var(--green-50);padding:6px 12px;border-radius:999px;margin-bottom:6px}
.demo-live .blip{width:7px;height:7px;border-radius:999px;background:var(--green-br);animation:blip 1.4s infinite}
@keyframes blip{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 9px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.detail h1{font-size:34px;font-weight:800;letter-spacing:-.025em;line-height:1.18;margin:0}
.detail .lede{color:var(--ink-2);font-size:17px;margin-top:14px;max-width:none}
.feats{list-style:none;padding:0;margin:24px 0 0;display:flex;flex-direction:column;gap:14px}
.feats li{display:flex;align-items:flex-start;gap:12px;font-size:15.5px;color:var(--ink-2);font-weight:500}
.feats .fi{flex:none;width:24px;height:24px;border-radius:999px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;margin-top:1px}

.wheel-box{position:relative;width:300px;height:300px;display:grid;place-items:center}
.wheel-pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:24px solid var(--ink);filter:drop-shadow(0 3px 4px rgba(0,0,0,.25))}
.wheel{width:280px;height:280px;border-radius:999px;position:relative;box-shadow:0 0 0 10px #fff,0 0 0 13px var(--line),var(--sh-lg);transition:transform 4.6s cubic-bezier(.16,.84,.3,1)}
.wheel-hub{position:absolute;width:62px;height:62px;border-radius:999px;background:#fff;z-index:4;display:grid;place-items:center;box-shadow:0 4px 12px rgba(0,0,0,.2);font-weight:800;overflow:hidden}
.wheel-hub img{width:100%;height:100%;object-fit:cover}
.wheel-cta{margin-top:26px;display:flex;flex-direction:column;align-items:center;gap:10px}
.spinbtn{background:var(--ink);color:#fff;font-weight:800;font-size:17px;padding:14px 40px;border-radius:999px;box-shadow:var(--sh);transition:transform .1s}
.spinbtn:hover{transform:translateY(-2px)}.spinbtn[disabled]{opacity:.5;pointer-events:none}
.prizebanner{min-height:26px;font-weight:700;font-size:17px;text-align:center}.prizebanner b{color:var(--green-d)}
.scratch-box{position:relative;width:300px;height:200px;border-radius:18px;overflow:hidden;box-shadow:var(--sh)}
.scratch-prize{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#fff}
.scratch-prize .big{font-size:30px;font-weight:800;color:var(--green-d)}
.scratch-canvas{position:absolute;inset:0;cursor:grab;touch-action:none}
.scratch-hint{margin-top:14px;color:var(--muted);font-size:14px}

.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:28px}
.drop{border:2px dashed var(--line);border-radius:var(--r);background:#fff;padding:26px;text-align:center;transition:border-color .2s,background .2s;position:relative}
.drop.full{border-style:solid;border-color:var(--green-100);background:var(--green-50)}
.drop h3{font-size:16px;font-weight:700;margin:14px 0 4px}.drop p{font-size:13.5px;color:var(--muted);margin:0}
.drop .opt{position:absolute;top:12px;right:14px;font-size:12px;font-weight:600;color:var(--muted-2);background:#EAF1EE;padding:3px 9px;border-radius:999px}
.drop .ic{width:46px;height:46px;border-radius:14px;background:#EAF1EE;display:grid;place-items:center;margin:0 auto;color:var(--muted)}
.drop.full .ic{background:#fff;color:var(--green-d)}
.preview-logo{width:54px;height:54px;border-radius:14px;object-fit:cover;margin:0 auto;display:block;box-shadow:var(--sh-sm)}
.linkbtn{background:none;color:var(--green-d);font-weight:700;font-size:13.5px;margin-top:10px}
.samples{display:flex;gap:9px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.samp{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:6px 12px 6px 7px;font-size:13px;font-weight:600;color:var(--ink-2);transition:all .15s}
.samp:hover{border-color:var(--green);transform:translateY(-1px)}
.samp .sm{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:14px;color:#fff}
.swatches{display:flex;gap:8px;justify-content:center;margin-top:16px;align-items:center}
.swatch{width:30px;height:30px;border-radius:9px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);transition:transform .15s;cursor:pointer}
.swatch:hover{transform:scale(1.12)}
.swatch.sel{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--ink)}
.autocolor{font-size:13px;color:var(--green-d);font-weight:600;display:flex;align-items:center;gap:6px;justify-content:center;margin-top:6px}
.thumbs-mini{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.thumbs-mini img{width:44px;height:44px;border-radius:9px;object-fit:cover;box-shadow:var(--sh-sm)}

.preview{display:grid;grid-template-columns:minmax(0,440px) minmax(0,1fr);gap:34px;align-items:start}
.preview .demo-stage{position:sticky;top:84px;min-height:460px}
/* 未登录预览：只有品牌一块 → 两列收窄居中，右卡不撑满、不空 */
.preview.lite{grid-template-columns:minmax(0,400px) minmax(0,440px);justify-content:center;gap:30px}
.preview.lite .demo-stage{min-height:420px}
.preview.lite .bc-btns{margin-left:0}
.editbox{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--sh-sm)}
.editrow{padding:16px 0;border-top:1px solid var(--line-2)}.editrow:first-child{padding-top:0;border-top:none}
.editrow .k{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.02em;text-transform:uppercase;margin-bottom:10px}
/* brand controls line: logo thumb + swatches + (Logo / 换色) buttons together */
.bc-line{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bc-btns{display:flex;gap:8px;margin-left:auto}
.thumb-x{position:relative;display:inline-block}
.thumb-x img{display:block;border-radius:8px;object-fit:cover}
.thumb-x button{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:999px;background:#0B1220;color:#fff;font-size:12px;line-height:1;display:grid;place-items:center;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.thumb-x button:hover{background:#DC2626}
.reroll{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink-2);border:1.5px solid var(--line);border-radius:10px;padding:8px 12px}
.reroll:hover{border-color:var(--muted-2)}
.prizechips{display:flex;flex-wrap:wrap;gap:7px}
.prizechip{font-size:13px;font-weight:600;background:#EAF1EE;color:var(--ink-2);padding:6px 11px;border-radius:8px}

/* ===== voucher editor (cards: name / price / discount / qty / per person) ===== */
.vlist{display:flex;flex-direction:column;gap:10px}
.vcard{border:1px solid var(--line);border-radius:12px;padding:11px;background:#FCFEFD}
.vcard-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.vc-name{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;font-weight:700;color:var(--ink)}
.vc-name:focus{outline:none;border-color:var(--green)}
.vc-stock{font-size:12px;color:var(--muted);white-space:nowrap}.vc-stock b{color:var(--green-d)}
.vc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.vc-grid label{display:flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.02em}
.vc-grid input{border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:13.5px;font-weight:600;color:var(--ink);width:100%}
.vc-grid input:focus{outline:none;border-color:var(--green)}
.vc-grid input.num{-moz-appearance:textfield;text-align:center}
.vc-grid input.num::-webkit-outer-spin-button,.vc-grid input.num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.vdel{width:24px;height:24px;border-radius:6px;color:var(--muted-2);font-size:18px;line-height:1;flex:none}
.vdel:hover{background:#FEECEC;color:#DC2626}
.vfoot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.vtot{font-size:13px;color:var(--muted)}.vtot b{color:var(--ink)}
.vnote{margin:8px 0 0;font-size:12.5px;color:var(--muted-2)}
.addrow{font-size:13.5px;font-weight:700;color:var(--green-d);border:1.5px dashed var(--green-100);border-radius:10px;padding:8px 14px}
.addrow:hover{background:var(--green-50);border-color:var(--green)}

/* ===== outlet scope (in editor) ===== */
.ock{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:14px;color:var(--ink-2);cursor:pointer}
.ock input{width:16px;height:16px;accent-color:var(--green);flex:none}
.ock em{color:var(--muted-2);font-style:normal}
.outlet-add{margin-top:10px;display:flex;flex-direction:column;gap:8px;padding:12px;border:1px dashed var(--green-100);border-radius:11px;background:var(--green-50)}
.outlet-add input{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;color:var(--ink);background:#fff;width:100%}
.outlet-add input:focus{outline:none;border-color:var(--green)}

/* ===== outlets manager (Me page) ===== */
.outlet-card{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;background:#FCFEFD}
.oc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.oc-pin{width:30px;height:30px;border-radius:8px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;flex:none}
.oc-name{flex:1;border:none;font-size:15.5px;font-weight:700;color:var(--ink);background:transparent;padding:4px 2px}
.oc-name:focus{outline:none;border-bottom:1.5px solid var(--green)}
.oc-tag{font-size:11px;font-weight:700;color:var(--green-d);background:var(--green-50);padding:3px 9px;border-radius:999px;flex:none}
.oc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.oc-grid .oc-full{grid-column:1 / -1}
.oc-grid input,.oc-grid select{border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;color:var(--ink);width:100%;background:#fff}
.oc-grid input:focus,.oc-grid select:focus{outline:none;border-color:var(--green)}

/* ===== game workspace (My games → edit) ===== */
.edit-live{display:inline-flex;align-items:center;gap:6px;margin-left:auto;font-size:12px;font-weight:700;color:var(--green-d);background:var(--green-50);padding:5px 11px;border-radius:999px}
.edit-live .b{width:6px;height:6px;border-radius:999px;background:var(--green-br)}
.iconx.sm{width:30px;height:30px;border-radius:9px}
.ws{display:grid;grid-template-columns:280px minmax(0,1fr) 400px;height:calc(100vh - 62px)}
.ws-chat{display:flex;flex-direction:column;border-right:1px solid var(--line);background:#fff;min-height:0}
.ws-eye{padding:14px 16px;font-size:12.5px;font-weight:800;color:var(--green-d);border-bottom:1px solid var(--line-2);text-transform:uppercase;letter-spacing:.04em}
.ws-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:88%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.5}
.bubble.ai{background:#F1F5F3;color:var(--ink-2);border-bottom-left-radius:5px;align-self:flex-start}
.bubble.user{background:var(--green);color:#fff;border-bottom-right-radius:5px;align-self:flex-end}
.confirm-card{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;display:flex;flex-direction:column;gap:9px}
.confirm-card .cc-t{font-size:13.5px;color:var(--ink)}
.ws-chips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 14px;border-top:1px solid var(--line-2)}
.ws-chips button{font-size:12.5px;font-weight:600;color:var(--ink-2);background:#F1F5F3;border-radius:999px;padding:7px 12px}
.ws-chips button:hover{background:var(--green-50);color:var(--green-d)}
.ws-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line-2)}
.ws-input input{flex:1;border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-size:14px}
.ws-input input:focus{outline:none;border-color:var(--green)}
.ws-input .btn.sm{padding:9px 12px}
.ws-preview{display:flex;flex-direction:column;min-height:0;background:radial-gradient(120% 80% at 50% 0%,#fff,#EAF2EE);padding:18px;overflow-y:auto}
.ws-preview .demo-stage{flex:1;min-height:360px}
.ws-toolbar{display:flex;gap:8px;margin-bottom:14px;justify-content:space-between;align-items:center}
.ws-tools-l{display:flex;gap:8px}
.ws-publish{font-size:13.5px;font-weight:700;border-radius:9px;padding:8px 16px}
.ws-publish.on{color:#DC2626;background:#fff;border:1.5px solid #F3C2C2}.ws-publish.on:hover{background:#FEF2F2}
.ws-publish.off{color:#fff;background:var(--green)}.ws-publish.off:hover{background:var(--green-d)}
.ws-tool{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--ink-2);background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px}
.ws-tool:hover{border-color:var(--muted-2)}
.ws-controls{border-left:1px solid var(--line);background:#fff;overflow-y:auto;padding:18px}
.ws-controls .editbox{border:none;box-shadow:none;padding:0}
.mgcard.clickable{cursor:pointer;transition:transform .15s,box-shadow .15s}
.mgcard.clickable:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.mgedit{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:13px;font-weight:700;color:var(--green-d)}
.qr{width:130px;height:130px;border-radius:14px;margin:0 auto;display:grid;place-items:center;box-shadow:var(--sh)}
.launchcard{text-align:center}
.done-hero{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.done-badge{width:74px;height:74px;border-radius:50%;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;margin-bottom:6px}
.done-badge svg{width:40px;height:40px}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9}}

/* ===== dashboard (data feedback) ===== */
.dash-top{display:flex;align-items:center;gap:18px;padding:15px 28px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:20}
.datepills{display:flex;gap:4px;background:#F1F5F3;border-radius:999px;padding:4px;margin-left:auto}
.datepills button{font-size:13px;font-weight:700;color:var(--muted);padding:7px 14px;border-radius:999px;transition:all .15s}
.datepills button.on{background:#fff;color:var(--ink);box-shadow:var(--sh-sm)}
.dash{max-width:1120px;margin:0 auto;padding:26px 28px 80px;animation:rise .4s ease both}
.dash-h{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0}
.dash-sub{color:var(--muted);font-size:15px;margin:4px 0 0}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--sh-sm)}
.kpi .kl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.kpi .kn{font-size:34px;font-weight:800;letter-spacing:-.03em;margin:8px 0 2px}
.kpi .kn small{font-size:16px;font-weight:700;color:var(--muted)}
.kpi .kd{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
.kd.up{color:var(--green-d)}.kd.down{color:#DC2626}.kd .ko{color:var(--muted-2);font-weight:500}
.spark{display:flex;align-items:flex-end;gap:3px;height:30px;margin-top:14px}
.spark i{flex:1;background:var(--green-100);border-radius:2px}.spark i.hi{background:var(--green)}
.panels{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;margin-top:16px}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--sh-sm)}
.panel h3{font-size:16.5px;font-weight:800;margin:0 0 3px;letter-spacing:-.01em}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.panel-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--green-d);white-space:nowrap}
.panel-link:hover{color:var(--green)}
.panel .ph-sub{font-size:13px;color:var(--muted);margin:0 0 18px}
.bars7{display:flex;align-items:flex-end;gap:10px;height:172px}
.bars7 .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.bars7 .bv{font-size:12px;font-weight:700;color:var(--ink-2)}
.bars7 .bar{width:100%;max-width:32px;background:linear-gradient(180deg,var(--green-br),var(--green));border-radius:7px 7px 0 0;transition:height .6s cubic-bezier(.2,.8,.2,1)}
.bars7 .bd{font-size:11.5px;color:var(--muted)}
.hbar{margin-bottom:15px}.hbar:last-child{margin-bottom:0}
.hbar .hl{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:7px;color:var(--ink-2)}
.hbar .hl .hv{color:var(--ink);font-weight:700}
.hbar .ht{height:11px;background:#EEF3F0;border-radius:999px;overflow:hidden}
.hbar .ht>i{display:block;height:100%;border-radius:999px;transition:width .6s}
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut{width:128px;height:128px;border-radius:999px;flex:none;display:grid;place-items:center}
.donut .hole{width:82px;height:82px;border-radius:999px;background:#fff;display:grid;place-items:center;text-align:center;line-height:1.2}
.donut .hole b{font-size:22px;font-weight:800;display:block}.donut .hole span{font-size:11px;color:var(--muted)}
.legend{display:flex;flex-direction:column;gap:12px}
.legend .lg{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:600;color:var(--ink-2)}
.legend .lg .sw{width:12px;height:12px;border-radius:4px;flex:none}
.legend .lg b{margin-left:4px}
.recall{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#FFF7E8,#fff);border:1px solid #F1E2C4;border-radius:18px;padding:18px 22px;margin-top:16px}
.recall.ok{background:linear-gradient(135deg,#ECFDF3,#fff);border-color:var(--green-100)}
.recall.ok .ri{background:var(--green-50);color:var(--green-d)}
.recall .ri{flex:none;width:44px;height:44px;border-radius:12px;background:#FBEFD3;color:var(--amber);display:grid;place-items:center}
.recall .ri svg{width:24px;height:24px}
.recall .rt b{font-size:18px;color:var(--ink)}.recall .rt p{margin:2px 0 0;font-size:14px;color:var(--muted)}
.recall .btn{margin-left:auto}
.feed-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line-2);font-size:14px}
.feed-row:first-child{border-top:none}
.feed-row .fi{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none}
.feed-row .fi svg{width:17px;height:17px}
.feed-row .ft{flex:1}.feed-row .ft b{font-weight:700}
.feed-row .fz{font-size:12.5px;color:var(--muted-2);font-weight:500}

/* ===== app shell (post-login) ===== */
.app-shell{display:flex;min-height:100vh;background:var(--bg)}
.sidebar{width:228px;flex:none;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh}
.sb-logo{display:flex;align-items:center;gap:9px;padding:4px 8px 18px}
/* sidebar shop identity */
.sb-id{display:flex;align-items:center;gap:10px;padding:4px 6px 16px;margin-bottom:6px;border-bottom:1px solid var(--line-2)}
.sb-avatar{width:38px;height:38px;border-radius:11px;object-fit:cover;flex:none}
.sb-avatar.ph{display:grid;place-items:center;background:var(--green);color:#fff;font-weight:800;font-size:17px}
.sb-idtxt{min-width:0}
.sb-name{font-size:15px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-outlet{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-kix{display:flex;align-items:center;gap:7px;opacity:.55}
.sb-kix .logo-img{height:18px}
.sb-nav{display:flex;flex-direction:column;gap:3px}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;font-size:14.5px;font-weight:600;color:var(--ink-2);transition:all .15s;text-align:left;width:100%}
.sb-item:hover{background:#EFF3F1}
.sb-item.on{background:var(--green-50);color:var(--green-d)}
.sb-item .si{width:20px;display:grid;place-items:center;font-size:16px;flex:none}
.sb-item .nbadge{margin-left:auto;font-size:11px;font-weight:800;background:var(--green);color:#fff;border-radius:999px;padding:1px 7px}
.sb-bottom{margin-top:auto;display:flex;flex-direction:column;gap:12px;padding-top:14px;border-top:1px solid var(--line-2)}
.sb-bottom .langtoggle{align-self:flex-start}

/* app-bar right cluster: outlet filter + account menu */
.app-bar-r{margin-left:auto;display:flex;align-items:center;gap:12px}
.outlet-filter{font-size:13.5px;font-weight:600;color:var(--ink-2);border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;background:#fff;cursor:pointer}
.outlet-filter:focus{outline:none;border-color:var(--green)}
.acct{position:relative}
.acct-btn{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:999px;padding:5px 12px 5px 6px;background:#fff}
.acct-btn:hover{border-color:var(--muted-2)}
.acct-btn .sb-avatar{width:28px;height:28px;border-radius:8px}
.acct-name{font-size:14px;font-weight:700;color:var(--ink);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acct-backdrop{position:fixed;inset:0;z-index:40}
.acct-menu{position:absolute;right:0;top:calc(100% + 8px);width:248px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);padding:8px;z-index:41}
.am-head{display:flex;align-items:center;gap:10px;padding:8px 8px 12px;border-bottom:1px solid var(--line-2);margin-bottom:6px}
.am-head .sb-avatar{width:34px;height:34px}
.am-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 10px;border-radius:9px;font-size:14px;font-weight:600;color:var(--ink-2)}
.am-item:hover{background:#EFF3F1}
.am-item.danger{color:#DC2626}.am-item.danger:hover{background:#FEF2F2}
.am-lang{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-size:14px;font-weight:600;color:var(--ink-2);border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2);margin:6px 0}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column}
.app-bar{display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:10}
.app-bar h2{font-size:19px;font-weight:800;margin:0;letter-spacing:-.01em}
.app-body{padding:26px 28px 70px;width:100%;max-width:1080px;animation:rise .4s ease both}

/* home */
.home-hero{background:linear-gradient(135deg,#0B1220,#1b2940);color:#fff;border-radius:22px;padding:26px 28px;display:flex;gap:26px;align-items:center;flex-wrap:wrap;box-shadow:var(--sh)}
.home-hero .hl-live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#bdf5cf;background:rgba(34,197,94,.16);padding:5px 11px;border-radius:999px}
.home-hero .hl-live .b{width:7px;height:7px;border-radius:999px;background:var(--green-br)}
.home-hero h3{font-size:22px;font-weight:800;margin:12px 0 16px;letter-spacing:-.01em}
.live3{display:flex;gap:34px;flex-wrap:wrap}
.live3 .lc .n{font-size:30px;font-weight:800;letter-spacing:-.02em}
.live3 .lc .l{font-size:12.5px;color:#9fb0c4;font-weight:500;margin-top:2px}
.home-hero .hh-action{margin-left:auto;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.qr-sm{width:96px;height:96px;border-radius:13px;background:#fff;display:grid;place-items:center;box-shadow:var(--sh)}
.home-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-top:16px}
.nudge h4{font-size:16px;font-weight:800;margin:0 0 4px}
.nudge .ph-sub{font-size:13px;color:var(--muted);margin:0 0 16px}
.nstep{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line-2);font-size:14.5px;font-weight:600;color:var(--ink-2)}
.nstep:first-of-type{border-top:none}
.nstep.done{color:var(--muted)}
.nstep .nt{width:26px;height:26px;border-radius:999px;border:2px solid var(--line);display:grid;place-items:center;flex:none;font-size:12px;font-weight:700;color:var(--muted-2)}
.nstep.done .nt{background:var(--green);border-color:var(--green);color:#fff}
.nstep.cur .nt{border-color:var(--green);color:var(--green-d)}
.nstep .na{margin-left:auto}

/* my games */
.mygames{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.mgcard{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--sh-sm)}
.mgcard .mgart{aspect-ratio:9/16;display:grid;place-items:center;position:relative}
.mgcard .mgart .m{font-size:54px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.22))}
.mgcard .mglive{position:absolute;top:12px;left:12px;font-size:11px;font-weight:700;color:#fff;background:rgba(11,18,32,.55);padding:4px 10px;border-radius:999px;display:flex;align-items:center;gap:5px}
.mgcard .mglive .b{width:6px;height:6px;border-radius:999px;background:var(--green-br)}
.mgcard .mgmeta{padding:15px 16px}
.mgcard .mgmeta .nm{font-weight:700;font-size:16px}
.mgcard .mgmeta .st{font-size:13px;color:var(--muted);margin-top:3px}
.mgcard.sel{border:2px solid var(--green);box-shadow:var(--sh)}
.mgnew{border:2px dashed var(--line);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);min-height:200px;transition:all .15s;background:#fff}
.mgnew:hover{border-color:var(--green);color:var(--green-d)}
.mgnew .plus{width:46px;height:46px;border-radius:999px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;font-size:24px;font-weight:700}

/* redeem */
.redeem-wrap{max-width:1080px;display:grid;grid-template-columns:minmax(0,400px) minmax(0,1fr);gap:18px;align-items:start}
.rd-left,.rd-right{display:flex;flex-direction:column;gap:16px;min-width:0}
@media(max-width:900px){.redeem-wrap{grid-template-columns:1fr}}
/* redemption dashboard */
.rd-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.rd-sum{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--sh-sm)}
.rd-sum .n{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.rd-sum .l{font-size:12.5px;color:var(--muted);margin-top:3px}
.rd-list{display:flex;flex-direction:column;gap:16px;margin-top:6px}
.rd-row{}
.rd-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
.rd-name{font-size:14.5px;font-weight:700;color:var(--ink)}.rd-name em{color:var(--muted-2);font-style:normal;font-weight:500}
.rd-stat{font-size:13px;color:var(--muted);white-space:nowrap}.rd-stat b{color:var(--green-d);font-size:15px}
.rd-frac{font-size:15px;font-weight:700;color:var(--muted);white-space:nowrap}.rd-frac b{color:var(--green-d);font-size:18px}
.rd-note{font-size:12.5px;color:var(--muted);margin-top:6px}
.rd-bar{display:flex;height:11px;border-radius:999px;overflow:hidden;background:#EAF1EE}
.rd-bar i{height:100%}
.rd-bar .rdR{background:var(--green)}.rd-bar .rdC{background:var(--amber)}
.rd-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12.5px;color:var(--muted)}
.rd-legend i.d{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:0}
.rd-legend i.rdR{background:var(--green)}.rd-legend i.rdC{background:var(--amber)}.rd-legend i.rdL{background:#EAF1EE}
.redeem-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:30px;text-align:center;box-shadow:var(--sh-sm)}
.redeem-card .ic-big{width:60px;height:60px;border-radius:16px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;margin:0 auto 14px}
.redeem-card .ic-big svg{width:30px;height:30px}
.redeem-card h3{font-size:20px;font-weight:800;margin:0 0 6px}
.redeem-card p{font-size:14px;color:var(--muted);margin:0 0 18px}
.scanbtn{width:100%;margin-bottom:4px}
.scanbox{position:relative;height:170px;border-radius:16px;background:#0B1220;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;overflow:hidden;margin-bottom:4px}
.scanbox .scan-t{color:rgba(255,255,255,.8);font-size:13.5px;font-weight:600}
.scanline{position:absolute;left:12%;right:12%;height:2px;background:linear-gradient(90deg,transparent,var(--green-br),transparent);box-shadow:0 0 12px var(--green-br);animation:scanmove 1.5s ease-in-out infinite}
@keyframes scanmove{0%{top:24%}50%{top:76%}100%{top:24%}}
.redeem-or{display:flex;align-items:center;gap:12px;color:var(--muted-2);font-size:13px;margin:16px 0}
.redeem-or::before,.redeem-or::after{content:"";flex:1;height:1px;background:var(--line)}
.redeem-input{display:flex;gap:10px}
.redeem-input input{flex:1;font-size:18px;font-weight:700;letter-spacing:3px;text-align:center;padding:14px;border-radius:12px;border:1.5px solid var(--line);text-transform:uppercase}
.redeem-input input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px var(--green-50)}
.redeem-ok{background:var(--green-50);color:var(--green-d);border-radius:12px;padding:14px;font-weight:700;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;animation:rise .3s ease both}

@media(max-width:920px){
  .hero{grid-template-columns:1fr;gap:36px;text-align:center}
  .kpis{grid-template-columns:1fr 1fr}.panels{grid-template-columns:1fr}
  .app-shell{flex-direction:column}.sidebar{width:auto;height:auto;position:static;flex-direction:row;overflow-x:auto}.sb-nav{flex-direction:row}.sb-bottom{display:none}
  .home-grid{grid-template-columns:1fr}.mygames{grid-template-columns:1fr 1fr}
  .lede{margin-left:auto;margin-right:auto}.cta-row,.proof{justify-content:center}
  .navlinks{display:none}
  .three,.gallery,.steps,.tiers{grid-template-columns:1fr 1fr}
