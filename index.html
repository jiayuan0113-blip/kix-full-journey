.nstep{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line-2);font-size:14.5px;font-weight:600;color:var(--ink-2)}
.nstep:first-of-type{border-top:none}
.nstep.done{color:var(--muted)}
.nstep .nt{width:26px;height:26px;border-radius:999px;border:2px solid var(--line);display:grid;place-items:center;flex:none;font-size:12px;font-weight:700;color:var(--muted-2)}
.nstep.done .nt{background:var(--green);border-color:var(--green);color:#fff}
.nstep.cur .nt{border-color:var(--green);color:var(--green-d)}
.nstep .na{margin-left:auto}

/* my games */
.mygames{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.mgcard{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:visible;box-shadow:var(--sh-sm)}
.mgcard .mgart{aspect-ratio:1/1;display:grid;place-items:center;position:relative;overflow:hidden;border-radius:18px 18px 0 0}
.mgcard .mgart .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(11,18,32,.30);opacity:0;transition:opacity .2s;z-index:6}
.mgcard .mgart:hover .play{opacity:1}
.mgcard .mgart .play span{display:inline-flex;align-items:center;gap:7px;background:#fff;color:var(--ink);font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:999px;box-shadow:var(--sh)}
/* publish game modal */
.pub-scrim{position:fixed;inset:0;background:rgba(11,18,32,.5);z-index:60;display:grid;place-items:center;padding:24px;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.pub-modal{width:520px;max-width:100%;max-height:90vh;overflow-y:auto;background:#fff;border-radius:20px;padding:26px;box-shadow:var(--sh-lg);position:relative}
.pub-modal h3{font-size:20px;font-weight:800;margin:0;letter-spacing:-.01em}
.pub-sub{font-size:13.5px;color:var(--muted);margin:6px 0 18px}
.pub-x{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line)}
.pub-x:hover{background:var(--line-2)}
.pub-covers{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.pub-cover:first-child{width:130px;flex:none}
.pub-cover:last-child{flex:1}
.pc-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
.pc-box{position:relative;border-radius:12px;overflow:hidden;display:grid;place-items:center;box-shadow:var(--sh)}
.pc-ai{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;color:#fff;background:rgba(11,18,32,.45);padding:3px 8px;border-radius:999px}
.pc-name{color:#fff;font-weight:800;font-size:15px;text-align:center;padding:0 10px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.pc-replace{position:absolute;bottom:8px;right:8px;display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--ink);background:#fff;padding:6px 11px;border-radius:999px;box-shadow:var(--sh)}
.pub-namef{display:flex;flex-direction:column;gap:5px;margin-bottom:20px}
.pub-namef>span{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.pub-namef input{border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;font-weight:700;color:var(--ink)}
.pub-namef input:focus{outline:none;border-color:var(--green)}
.pub-actions{display:flex;gap:10px}
.pub-actions .btn{flex:1}
.pub-actions .btn:disabled{opacity:.45;pointer-events:none}
/* publish success */
.pub-done-badge{width:56px;height:56px;border-radius:999px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;margin:4px auto 14px}
/* CHAINS/Custom lead form modal */
.lead-modal{width:460px}
.lead-f{margin-top:12px}
.lead-f label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
.lead-f label i{color:var(--green-d);font-style:normal}
.lead-f label .opt{color:var(--muted);font-weight:400}
.lead-f input,.lead-f select,.lead-f textarea{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#fff;outline:none}
.lead-f input:focus,.lead-f select:focus,.lead-f textarea:focus{border-color:var(--green)}
.lead-f textarea{resize:none;height:54px}
.lead-consent{display:flex;gap:9px;align-items:flex-start;margin-top:14px;font-size:12.5px;color:var(--muted);line-height:1.45}
.lead-consent input{margin-top:2px;flex:none}
.lead-err{color:#DC2626;font-size:12px;margin-top:8px}
.lead-wa{display:block;text-align:center;margin-top:12px;font-size:13.5px;color:var(--green-d);font-weight:700;text-decoration:none;cursor:pointer}
.lead-wa:hover{text-decoration:underline}
.lead-back{display:block;margin:12px auto 0;background:none;border:none;color:var(--muted);font-size:13.5px;cursor:pointer;font-family:inherit}
/* card on file (SetupIntent — no charge) */
.cardf{border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:18px;background:var(--bg)}
.cardf-h{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:11px}
.cardf-input{display:flex;flex-direction:column;gap:9px}
.cardf-input input,.cardf-row input{border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14.5px;font-weight:600;color:var(--ink);background:#fff;width:100%}
.cardf-input input:focus,.cardf-row input:focus{outline:none;border-color:var(--green)}
.cardf-row{display:flex;gap:9px}
.cardf-saved{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14.5px}
.cardf-saved .linkbtn{margin:0}
.cardf-note{display:flex;gap:7px;align-items:flex-start;font-size:12px;line-height:1.5;color:var(--muted);margin:11px 0 0}
.cardf-note svg{margin-top:1px;color:var(--green-d)}
/* KiX app download (desktop→mobile handoff) */
.qrdl{display:flex;gap:16px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:16px}
.qrdl-code{flex:none;background:#fff;border-radius:10px;padding:8px;box-shadow:var(--sh-sm);line-height:0}
.qr-glyph{display:block;border-radius:2px}
.qrdl-r{min-width:0}
.qrdl-t{font-size:15px;font-weight:800;color:var(--ink)}
.qrdl-p{font-size:12.5px;line-height:1.5;color:var(--muted);margin:4px 0 10px}
.qrdl-badges{display:flex;gap:8px;flex-wrap:wrap}
.storebadge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 11px}
.btn.ghost.inapp{color:var(--green-d)}
/* billing rows + plan picker */
.billrow{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-top:12px}
/* 我的：保存反馈行 + App 一行 */
.me-save{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-top:16px}
.me-saved{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--green-d);animation:rise .25s both}
.me-approw{display:flex;align-items:center;gap:13px}
.me-app-ic{flex:none;width:40px;height:40px;border-radius:11px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center}
/* 下线撤销 toast */
.undo-toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:16px;background:var(--ink);color:#fff;border-radius:14px;padding:13px 16px 13px 18px;box-shadow:0 18px 40px -10px rgba(0,0,0,.4);animation:rise .28s cubic-bezier(.2,.8,.2,1) both}
.undo-toast .ut-txt{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.undo-toast .ut-txt svg{color:var(--green-br)}
.undo-toast .ut-undo{font-size:14px;font-weight:800;color:var(--green-br);padding:4px 8px;border-radius:8px;cursor:pointer;background:none;border:none}
.undo-toast .ut-undo:hover{background:rgba(255,255,255,.12)}
.bill-l{display:flex;align-items:center;gap:12px;min-width:0}
.bill-ic{width:34px;height:34px;border-radius:9px;background:var(--green-50);color:var(--green-d);display:grid;place-items:center;flex:none}
.bill-t{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.bill-v{font-size:15px;font-weight:800;color:var(--ink);margin-top:1px}
.plans{display:flex;flex-direction:column;gap:10px}
.plan-opt{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1.5px solid var(--line);border-radius:13px;padding:14px 16px;text-align:left;transition:border-color .12s}
.plan-opt:hover{border-color:var(--green)}
.plan-opt.on{border-color:var(--green);background:var(--green-50)}
.plan-nm{font-size:15.5px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
.plan-cur{font-size:10.5px;font-weight:700;color:var(--green-d);background:#fff;border:1px solid var(--green);border-radius:999px;padding:2px 8px}
.plan-note{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}
.plan-price{font-size:15px;font-weight:800;color:var(--ink);flex:none}
.mgcard .mgart .m{font-size:54px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.22))}
.mgcard .mglive{position:absolute;top:12px;left:12px;font-size:11px;font-weight:700;color:#fff;background:rgba(11,18,32,.55);padding:4px 10px;border-radius:999px;display:flex;align-items:center;gap:5px}
.mgcard .mglive .b{width:6px;height:6px;border-radius:999px;background:var(--green-br)}
.mgcard .mgmeta{padding:15px 16px}
.mgcard .mgmeta .nm{font-weight:700;font-size:16px}
.mgcard .mgmeta .st{font-size:13px;color:var(--muted);margin-top:3px}
/* 活动卡底部：状态操作(下线/上线) + ⋯ 溢出菜单 */
.mgfoot{display:flex;align-items:center;gap:8px;margin-top:10px}
.mgfoot .b-dot{display:inline-block;width:6px;height:6px;border-radius:999px;background:var(--green-br);margin-right:6px;vertical-align:1px}
.kebab{position:relative;margin-left:auto}
.kebab-btn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--muted);display:grid;place-items:center;cursor:pointer}
.kebab-btn:hover{background:#F1F5F9;color:var(--ink-2)}
.kebab-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:20;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-lg,0 18px 40px -12px rgba(11,18,32,.28));padding:6px;min-width:150px}
.kebab-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;background:none;border:none}
.kebab-item:hover{background:var(--green-50);color:var(--green-d)}
/* 活动卡效果行：到店 / 新客(计费) */
.act-stat{font-size:13px;color:var(--ink-2);margin-top:4px}
.act-stat b{font-size:15px;font-weight:800;color:var(--ink)}
.act-bill{margin-left:7px;font-size:11px;font-weight:800;color:var(--green-d);background:var(--green-50);border-radius:999px;padding:2px 7px}
/* 活动卡 券库存：送/剩 + 进度条 */
.stockrow{margin-top:8px}
.stock-bar{height:5px;border-radius:999px;background:var(--line-2);overflow:hidden}
.stock-bar i{display:block;height:100%;background:var(--green);border-radius:999px}
.stock-t{display:block;font-size:12px;color:var(--muted);margin-top:5px;font-weight:600}
.stockrow.low .stock-bar i{background:var(--amber)}
.stockrow.low .stock-t{color:var(--amber)}
.stockrow.out .stock-bar i{background:#DC2626}
.stockrow.out .stock-t{color:#DC2626;font-weight:800}
/* ===== 限时挑战赛(KiX Challenge) ===== */
/* 活动品牌 Logo 上传（名称行右侧方块） */
.act-idrow{display:flex;gap:12px;align-items:stretch}
.act-logo-up{width:52px;flex:none;border-radius:12px;border:1.5px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted-2);font-size:9.5px;font-weight:700;overflow:hidden;background:#fff;transition:border-color .12s}
.act-logo-up:hover{border-color:var(--muted-2);color:var(--ink-2)}
.act-logo-up img{width:100%;height:100%;object-fit:cover}
/* 卡片：限时赛徽章 + 档期 */
.chal-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:#9A3412;background:#FFEDD5;border-radius:999px;padding:2px 8px;margin-right:8px;vertical-align:2px}
.chal-when{font-size:13px;color:var(--muted);margin-top:3px;font-weight:600}
.chal-when.next{color:var(--ink);font-weight:800;display:flex;align-items:center;gap:6px}
.cw-dot{width:7px;height:7px;border-radius:999px;background:var(--green-br);box-shadow:0 0 0 3px var(--green-50);flex:none}
/* 建活动第一步：形态选择弹窗 */
.na-pick{width:760px;max-width:100%;background:#fff;border-radius:20px;padding:26px;box-shadow:var(--sh-lg);position:relative}
.na-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px}
.na-card{display:flex;flex-direction:column;align-items:flex-start;text-align:left;gap:8px;border:1.5px solid var(--line);background:#fff;border-radius:16px;padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .12s}
.na-card:hover{border-color:var(--green-br);box-shadow:0 14px 30px -18px rgba(22,163,74,.5);transform:translateY(-2px)}
.na-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--green-50);color:var(--green-d)}
.na-ic svg{width:22px;height:22px}
.na-challenge .na-ic{background:#FFEDD5;color:#C2410C}
.na-tag{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--green-d)}
.na-challenge .na-tag{color:#C2410C}
.na-nm{font-size:18px;font-weight:800;color:var(--ink)}
.na-line{font-size:13.5px;color:var(--ink-2);margin:0;line-height:1.5}
.na-fit{font-size:12.5px;color:var(--muted);line-height:1.5}
.na-fit-l{display:block;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-2);margin-bottom:2px}
.na-eg{font-size:12.5px;color:var(--muted-2);font-style:italic;border-top:1px solid var(--line-2);padding-top:10px;margin-top:auto;width:100%}
.na-go{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--green-d);margin-top:2px}
.na-challenge .na-go{color:#C2410C}
/* 档期编辑：段选 + 星期 chips */
.seg2{display:inline-flex;background:var(--line-2);border-radius:11px;padding:3px;gap:3px}
.seg2 button{border:none;background:transparent;font-size:13.5px;font-weight:700;color:var(--muted);padding:7px 18px;border-radius:9px;cursor:pointer}
.seg2 button.on{background:#fff;color:var(--ink);box-shadow:var(--sh-sm)}
.day-chips{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.dchip{width:38px;height:38px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-size:13.5px;font-weight:700;color:var(--ink-2);cursor:pointer;transition:all .12s}
.dchip:hover{border-color:var(--muted-2)}
.dchip.on{background:var(--green);border-color:var(--green);color:#fff}
/* 阶梯奖池 */
.ladder-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.cost-bar{display:flex;align-items:center;flex-wrap:wrap;gap:6px;background:var(--green-50);border:1px solid var(--green-100);border-radius:12px;padding:11px 14px;margin:12px 0 14px;font-size:13.5px;color:var(--ink-2)}
.cost-bar b{color:var(--green-d);font-weight:800;font-size:15px}
.cost-note{flex-basis:100%;font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.ladder-rows{display:flex;flex-direction:column;gap:8px}
.lrow{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px 12px}
.lrank{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap}
.lrank input{width:58px;padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;font-weight:700;color:var(--ink);text-align:center}
.lrank span{color:var(--muted-2)}
.lprize{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.lprize select{padding:7px 10px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;font-weight:600;color:var(--ink);background:#fff;cursor:pointer}
.pfield{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--muted)}
.pfield input{width:64px;padding:7px 9px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-weight:700;color:var(--ink);text-align:center}
.plabel{flex:1;min-width:80px;padding:7px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink)}
.lact{display:flex;gap:4px;flex:none}
.lact button{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:all .12s}
.lact button:hover{color:var(--ink);border-color:var(--muted-2)}
/* 奖品档两行块：上行 名次/类型/值，下行 名称/配图/券码 */
.lcard{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:9px}
.lrow-top{display:flex;align-items:center;gap:10px}
.cash-split{font-size:12px;font-weight:700;color:var(--green-d);white-space:nowrap;margin-left:2px}
.pcash input{width:48px}
.pcash-x{color:var(--muted-2);font-weight:700}
